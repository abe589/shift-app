services:
  - type: web
    name: shift-app
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_DEBUG
        value: false
    disk:
      name: shifts-data
      mountPath: /opt/render/project/src
      sizeGB: 1
