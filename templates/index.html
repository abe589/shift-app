{% extends "base.html" %}
{% block title %}シフト入力{% endblock %}
{% block header %}SHIFT入力{% endblock %}

{% block content %}
<style>
    .time-picker {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 6px;
    }
    .time-picker select { padding: 13px 10px; text-align: center; }
    .time-sep { font-size: 20px; font-weight: bold; color: #999; text-align: center; }
    /* hidden input for form submission */
    input[name="start_time"], input[name="end_time"] { display: none; }
</style>

<div class="card">
    <div class="card-title">シフトを入力</div>
    <form action="/submit" method="post" id="shiftForm">

        <label for="staff_name">名前</label>
        <select name="staff_name" id="staff_name" required>
            <option value="">選んでください</option>
            {% for name in staff_list %}
            <option value="{{ name }}">{{ name }}</option>
            {% endfor %}
        </select>

        <label for="shift_date">勤務日</label>
        <input type="date" name="shift_date" id="shift_date" required>

        <div class="time-row" style="margin-top:16px;">
            <div>
                <label>開始時刻</label>
                <div class="time-picker">
                    <select id="start_h"></select>
                    <div class="time-sep">:</div>
                    <select id="start_m"></select>
                </div>
                <input type="hidden" name="start_time" id="start_time">
            </div>
            <div>
                <label>終了時刻</label>
                <div class="time-picker">
                    <select id="end_h"></select>
                    <div class="time-sep">:</div>
                    <select id="end_m"></select>
                </div>
                <input type="hidden" name="end_time" id="end_time">
            </div>
        </div>

        <label class="overnight-box" for="is_overnight" style="display:flex; margin-top:14px;">
            <input type="checkbox" name="is_overnight" id="is_overnight">
            <span>🌙 終了が翌日（深夜0時以降）</span>
        </label>

        <div class="overnight-hint" id="overnight-hint">
            例：深夜1時30分終了 → 終了時刻を「1時30分」に設定してください
        </div>

        <button type="submit" class="btn btn-primary">送信する</button>
    </form>
</div>

<div class="card">
    <div class="card-title">入力確認</div>
    <select id="confirm_staff">
        <option value="">名前を選んでください</option>
        {% for name in staff_list %}
        <option value="{{ name }}">{{ name }}</option>
        {% endfor %}
    </select>
    <button onclick="goConfirm()" class="btn btn-secondary">確認する</button>
</div>

<script>
    // 日付デフォルト
    const today = new Date();
    document.getElementById('shift_date').value =
        `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

    // 時・分の選択肢を生成
    function buildHour(id, defaultH) {
        const sel = document.getElementById(id);
        for (let h = 0; h <= 23; h++) {
            const o = document.createElement('option');
            o.value = String(h).padStart(2,'0');
            o.textContent = String(h).padStart(2,'0') + '時';
            if (h === defaultH) o.selected = true;
            sel.appendChild(o);
        }
    }

    function buildMin(id) {
        const sel = document.getElementById(id);
        for (let m = 0; m < 60; m += 5) {
            const o = document.createElement('option');
            o.value = String(m).padStart(2,'0');
            o.textContent = String(m).padStart(2,'0') + '分';
            sel.appendChild(o);
        }
    }

    buildHour('start_h', 17);
    buildMin('start_m');
    buildHour('end_h', 22);
    buildMin('end_m');

    // hidden inputに値をセット
    function syncTime() {
        document.getElementById('start_time').value =
            document.getElementById('start_h').value + ':' + document.getElementById('start_m').value;
        document.getElementById('end_time').value =
            document.getElementById('end_h').value + ':' + document.getElementById('end_m').value;
    }

    ['start_h','start_m','end_h','end_m'].forEach(id => {
        document.getElementById(id).addEventListener('change', syncTime);
    });
    syncTime(); // 初期値セット

    // 翌日ヒント
    document.getElementById('is_overnight').addEventListener('change', function() {
        document.getElementById('overnight-hint').style.display = this.checked ? 'block' : 'none';
    });

    // 送信バリデーション
    document.getElementById('shiftForm').addEventListener('submit', function(e) {
        syncTime();
        const start = document.getElementById('start_time').value;
        const end   = document.getElementById('end_time').value;
        const overnight = document.getElementById('is_overnight').checked;
        if (!overnight) {
            const [sh, sm] = start.split(':').map(Number);
            const [eh, em] = end.split(':').map(Number);
            if (eh * 60 + em <= sh * 60 + sm) {
                e.preventDefault();
                alert('終了時刻は開始時刻より後にしてください\n翌日深夜に終わる場合は「翌日チェック」を入れてください');
            }
        }
    });

    function goConfirm() {
        const staff = document.getElementById('confirm_staff').value;
        if (!staff) { alert('名前を選んでください'); return; }
        window.location.href = `/confirm?staff=${encodeURIComponent(staff)}`;
    }
</script>
{% endblock %}
