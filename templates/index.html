{% extends "base.html" %}
{% block title %}シフト入力{% endblock %}
{% block header %}SHIFT入力{% endblock %}

{% block content %}
<div class="card">
    <div class="card-title">シフトを入力</div>
    <form action="/submit" method="post" id="shiftForm">

        <label for="staff_name">名前</label>
        <select name="staff_name" id="staff_name" required>
            <option value="">選んでください</option>
            {% for name in staff_list %}
            <option value="{{ name }}">{{ name }}</option>
            {% endfor %}
        </select>

        <label for="shift_date">勤務日</label>
        <input type="date" name="shift_date" id="shift_date" required>

        <div class="time-row">
            <div>
                <label for="start_time">開始時刻</label>
                <input type="time" name="start_time" id="start_time" step="300" required>
            </div>
            <div>
                <label for="end_time">終了時刻</label>
                <input type="time" name="end_time" id="end_time" step="300" required>
            </div>
        </div>

        <label class="overnight-box" for="is_overnight" style="display:flex; margin-top:14px;">
            <input type="checkbox" name="is_overnight" id="is_overnight">
            <span>🌙 終了が翌日（深夜0時以降）</span>
        </label>

        <div class="overnight-hint" id="overnight-hint">
            例：深夜1時30分終了 → 「1:30」と入力してください
        </div>

        <button type="submit" class="btn btn-primary">送信する</button>
    </form>
</div>

<div class="card">
    <div class="card-title">入力確認</div>
    <select id="confirm_staff">
        <option value="">名前を選んでください</option>
        {% for name in staff_list %}
        <option value="{{ name }}">{{ name }}</option>
        {% endfor %}
    </select>
    <button onclick="goConfirm()" class="btn btn-secondary">確認する</button>
</div>

<script>
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const dd = String(today.getDate()).padStart(2, '0');
    document.getElementById('shift_date').value = `${yyyy}-${mm}-${dd}`;

    document.getElementById('is_overnight').addEventListener('change', function() {
        document.getElementById('overnight-hint').style.display = this.checked ? 'block' : 'none';
    });

    document.getElementById('shiftForm').addEventListener('submit', function(e) {
        const start = document.getElementById('start_time').value;
        const end = document.getElementById('end_time').value;
        const overnight = document.getElementById('is_overnight').checked;
        if (start && end && !overnight) {
            const [sh, sm] = start.split(':').map(Number);
            const [eh, em] = end.split(':').map(Number);
            if (eh * 60 + em <= sh * 60 + sm) {
                e.preventDefault();
                alert('終了時刻は開始時刻より後にしてください\n翌日深夜に終わる場合は「翌日チェック」を入れてください');
            }
        }
    });

    function goConfirm() {
        const staff = document.getElementById('confirm_staff').value;
        if (!staff) { alert('名前を選んでください'); return; }
        window.location.href = `/confirm?staff=${encodeURIComponent(staff)}`;
    }
</script>
{% endblock %}
